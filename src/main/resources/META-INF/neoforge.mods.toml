modLoader = "javafml"
loaderVersion = "[4,)"
license = "MIT"
issueTrackerURL = "https://github.com/REPLACE_ME/macglcompat/issues"

[[mods]]
modId = "macglcompat"
version = "${mod_version}"
displayName = "MacGLCompat"
authors = "Createpedia community"
description = '''
A macOS OpenGL 4.1 -> Metal compatibility shim for NeoForge.

Apple capped its OpenGL driver at 4.1 in 2018, so mods needing compute shaders,
SSBOs, or other 4.2+ features (Iris shaderpacks, Voxy, Flywheel indirect) fail on
Apple Silicon. MacGLCompat intercepts those entry points at LWJGL's function-provider
layer and routes them to a Metal backend. No-op on every other platform.
'''

# Phase 1 will add a [[mixins]] config here for a window-init hook. None in Phase 0.

[[dependencies.macglcompat]]
modId = "neoforge"
type = "required"
versionRange = "[21.1.0,)"
ordering = "NONE"
side = "CLIENT"

[[dependencies.macglcompat]]
modId = "minecraft"
type = "required"
versionRange = "[1.21.1,1.22)"
ordering = "NONE"
side = "CLIENT"
