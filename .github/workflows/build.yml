name: build

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

# Opt JS actions into Node.js 24 now (silences the Node 20 deprecation warning).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ---------------------------------------------------------------------------
  # 1. Java side: does the NeoForge mod compile? (no Mac needed)
  # ---------------------------------------------------------------------------
  java-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10'

      - name: Compile + assemble jar
        run: gradle --no-daemon build

      - name: Upload mod jar (no native yet)
        uses: actions/upload-artifact@v4
        with:
          name: mod-jar-java-only
          path: build/libs/*.jar
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # 2. Native side: build the dylib on Apple Silicon AND run the headless Metal
  #    compute self-test. This is the Phase 0 proof that the Metal path works
  #    in CI without a physical Mac.
  # ---------------------------------------------------------------------------
  native-build:
    # macos-14 runners are Apple Silicon (M1).
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21 (for JNI headers)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache fetched shader-toolchain deps
        uses: actions/cache@v4
        with:
          path: native/build/_deps
          # Include the runner image version: a new image ships a new SDK, which
          # invalidates glslang's precompiled headers (PCH mtime mismatch). Keying on
          # the image busts the cache exactly when that happens.
          key: deps-${{ runner.os }}-${{ env.ImageVersion }}-${{ hashFiles('native/CMakeLists.txt') }}

      - name: Configure (CMake)
        run: cmake -S native -B native/build -DCMAKE_BUILD_TYPE=Release

      - name: Build dylib + test
        run: cmake --build native/build --config Release -j3

      - name: Run headless Metal compute self-test
        run: |
          set +e
          ./native/build/headless_compute_test
          code=$?
          if [ "$code" -eq 2 ]; then
            echo "::warning::No Metal device on this runner — compute correctness was not verified here."
            exit 0
          fi
          exit $code

      - name: Run headless IOSurface bridge self-test
        run: |
          set +e
          ./native/build/headless_iosurface_test
          code=$?
          if [ "$code" -eq 2 ]; then
            echo "::warning::No Metal device on this runner — IOSurface bridge not verified here."
            exit 0
          fi
          exit $code

      - name: Run trampoline tests (resolution + glGetString spoof, CPU — must pass)
        run: ./native/build/trampoline_test

      - name: Run compute pipeline test (MSL->pipeline->dispatch; needs GPU)
        run: |
          set +e
          ./native/build/headless_compute_pipeline_test
          code=$?
          if [ "$code" -eq 2 ]; then
            echo "::warning::No Metal device — compute pipeline not verified here."
            exit 0
          fi
          exit $code

      - name: Run end-to-end test (GLSL->MSL->Metal dispatch; needs GPU)
        run: |
          set +e
          ./native/build/headless_e2e_test
          code=$?
          if [ "$code" -eq 2 ]; then
            echo "::warning::No Metal device — end-to-end Phase 2 path not verified here."
            exit 0
          fi
          exit $code

      - name: Run transpiler tests (GLSL->SPIR-V->MSL, CPU — must pass)
        run: ./native/build/transpiler_test

      - name: Run transpiler concurrency test (parallel batch, CPU — must pass)
        run: ./native/build/transpiler_concurrency_test

      - name: Upload dylib
        uses: actions/upload-artifact@v4
        with:
          name: native-dylib
          path: native/build/libmacglcompat.dylib
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # 3. Package: drop the dylib into resources and rebuild the final mod jar.
  # ---------------------------------------------------------------------------
  package:
    needs: [ java-build, native-build ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10'

      - name: Fetch dylib
        uses: actions/download-artifact@v4
        with:
          name: native-dylib
          path: dylib-in

      - name: Place dylib into resources
        run: |
          mkdir -p src/main/resources/natives/macos/aarch64
          cp dylib-in/libmacglcompat.dylib src/main/resources/natives/macos/aarch64/

      - name: Rebuild jar with native bundled
        run: gradle --no-daemon build

      - name: Upload final mod jar
        uses: actions/upload-artifact@v4
        with:
          name: macglcompat-mod
          path: build/libs/*.jar
          if-no-files-found: error
